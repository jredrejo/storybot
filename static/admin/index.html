<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryBot Admin</title>
    <link rel="stylesheet" href="/shared/theme.css">
    <link rel="stylesheet" href="/admin/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>StoryBot Admin</h1>
            <div class="status-icons">
                <!-- NFC Reader Status -->
                <span class="status-icon" id="nfc-status" title="NFC Reader: Checking...">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <!-- NFC/Contactless icon -->
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/>
                        <path d="M7 12c0-2.76 2.24-5 5-5v2c-1.66 0-3 1.34-3 3H7z"/>
                        <path d="M17 12c0 2.76-2.24 5-5 5v-2c1.66 0 3-1.34 3-3h2z"/>
                        <circle cx="12" cy="12" r="2"/>
                    </svg>
                </span>
                <!-- LED Strip Status -->
                <span class="status-icon" id="led-status" title="LED Strip: Checking...">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <!-- LED/Light bulb icon -->
                        <path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.85 11.1l-.85.6V16h-4v-2.3l-.85-.6A4.997 4.997 0 0 1 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.63-.8 3.16-2.15 4.1z"/>
                    </svg>
                </span>
            </div>
        </header>

        <section class="upload-section">
            <h2>Upload New Story</h2>
            <form id="upload-form" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        required
                        maxlength="100"
                        placeholder="e.g., The Three Little Pigs"
                    >
                </div>

                <div class="form-group">
                    <label for="emoji">Emoji *</label>
                    <div class="emoji-input-wrapper">
                        <input
                            type="text"
                            id="emoji"
                            name="emoji"
                            required
                            maxlength="10"
                            placeholder="e.g., 🐷 🐖 🐽"
                        >
                        <button type="button" class="emoji-trigger-btn" aria-label="Open emoji picker">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm-4-8c.79 0 1.5-.71 1.5-1.5S8.79 9 8 9s-1.5.71-1.5 1.5S7.21 12 8 12zm8 0c.79 0 1.5-.71 1.5-1.5S16.79 9 16 9s-1.5.71-1.5 1.5S15.21 12 16 12zm-7.25 4.25c0 .41.34.75.75.75h13c.41 0 .75-.34.75-.75v-.5c0-2.52-2.02-4.5-4.5-4.5h-1.5c-2.52 0-4.5 1.98-4.5 4.5v.5z"/>
                            </svg>
                        </button>
                        <div id="emoji-picker" class="emoji-picker hidden">
                            <input
                                type="text"
                                class="emoji-search"
                                placeholder="Search emojis..."
                            >
                            <div class="emoji-categories">
                                <button type="button" class="emoji-category-tab active" data-category="Animals">Animals</button>
                                <button type="button" class="emoji-category-tab" data-category="Food">Food</button>
                                <button type="button" class="emoji-category-tab" data-category="Weather">Weather</button>
                                <button type="button" class="emoji-category-tab" data-category="Activities">Activities</button>
                                <button type="button" class="emoji-category-tab" data-category="Emotions">Emotions</button>
                                <button type="button" class="emoji-category-tab" data-category="Objects">Objects</button>
                            </div>
                            <div class="emoji-grid"></div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="led_color">LED Color *</label>
                    <input
                        type="color"
                        id="led_color"
                        name="led_color"
                        value="#00FF00"
                    >
                </div>

                <div class="form-group">
                    <label for="audio">Audio File *</label>
                    <input
                        type="file"
                        id="audio"
                        name="audio"
                        accept="audio/mpeg,audio/wav"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="cover">Cover Image (optional)</label>
                    <input
                        type="file"
                        id="cover"
                        name="cover"
                        accept="image/*"
                    >
                </div>

                <button type="submit" class="btn btn-primary">Upload Story</button>
            </form>
        </section>

        <section class="stories-section">
            <h2>Story Library</h2>
            <div id="story-list" class="story-list">
                <p class="loading">Loading stories...</p>
            </div>
        </section>

        <div id="status-message" class="status-message hidden"></div>
    </div>

    <script src="/admin/script.js"></script>
</body>
</html>
